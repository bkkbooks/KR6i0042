body:
  text: 眼之中欣淨土即妙行不成若冀天宮恐勝因無就淨土雖無惡染聖教自有參差天宮雖有欲樂道理定無疑或欲塵境者觸事染而不染耽欲樂者是事不染而染戒業缺然福殘薄佛既應物機而現穢凡亦契聖境而欣生上聖上賢皆為此業下凡下位何得越之故行同者皆應專率習已穿鑿望允生因自餘狀跡具如別傳上來述第一天上利益已訖佛說彌勒下生經者述云將講此經略有三門一來意二釋名三講文初來意有二一為化下品衆生故彌勒生天雖復利益上中品人而下品人未得入聖之益故二為顯人間教道故天上教導雖先廣顯而人間七相教化衆生猶未唱故以此二義故以上生後辨下生第二釋名略有三對一能說所說對佛說即能說也彌勒等即所說也二能受所受對即彌勒名能受下生名所受三所詮能詮對即彌勒下生名所詮經名能詮下生有三義一初入胎之為名二入住出胎總名三人間之都言雖有八相而後七相皆在人間對天而言皆下生故從狹至寬分為三義義亦無違此即天報沒已還生人間故名下生廣談下聖化之事故名下生經下生之經故依士釋聞如是至五百人俱者述云第三講文之第二辨下人化益有二初略辨下人化益衆生後廣辨下人化益衆生下品之人自有優劣故有此略廣之說初有三分初證信傳經分次問答廣說分後聞說喜行分有三分之意思之可解此初也有義此經亦有起說之序從爾時阿難至即就坐即發起說故此解不然無有餘經對問佛答名曰發起而可為例故所以然者如來說法不可一例或各說法時以放光動地召衆為緣然後說經或說餘經乃即率說更無顯相此經同後故無起說序也於中有五句中三同前初聞如是者前標所聞之法故先如是後曰我聞今以多聞總持之用表領如來所說之法故曰聞如是或華夷語次第異故隨存一種義亦無失五百人者如中阿含云世尊此五百比丘幾比丘得三明達幾比丘得俱解脫幾比丘得慧解脫世尊告曰舍利子此五百比丘九十比丘得三明達九十比丘得俱解脫餘比丘得慧解脫以此證知三明俱解脫義亦異也爾時阿難至右膝著地者述云第二問答廣說有四一阿難陳請二如來許說三宿習故白世尊言至皆悉明了者述曰第二歎聖有二初總歎後別歎此初也事即指法故總也欲請彌勒當來化導之事故須歎三達智諸過去佛至皆悉知之者述云第二別歎有三初歎過去智次歎現在智後歎未來智初又有三初能化次化時後化衆此初也姓即種姓毗婆尸佛出剎利種姓拘利若尸棄佛毗舍婆佛種姓亦爾拘樓孫佛出婆羅門種姓迦葉拘那含佛迦葉佛種亦同字即草年之名名者初生之名號即十號弟子即聲聞菩薩可解聲聞菩薩補翼世尊故云翼從翼者助也成也毗婆尸佛三會說法初十六萬八千人次十萬人後八萬人尸棄佛亦三會說初十萬人次八萬人後七萬人毗舍婆佛二會說法初七萬人次六萬人拘樓孫佛一會說法有四萬人拘那含佛一會說法有三萬人迦葉如來一會說法有二萬人釋迦示一會說千二百五十人經云多少意在此也廣如長阿含第一一劫百劫至皆悉觀察者述云第二知化時也如婦人無近請佛經云第一佛字唯衛般涅槃曰已來九十一劫第二佛字戒式佛般涅槃曰已來三十一劫第三佛字隨葉佛般涅槃曰亦卅一劫是颰陀羅劫中當有五百佛第一者拘樓孫佛般泥曰已來萬歲第二者拘那含牟尼佛般泥曰已來萬歲第三者迦葉佛般泥曰已來萬歲第四佛我字釋迦文佛有說既言毗婆尸等三佛般涅槃已來九十一及卅一劫故即知餘三佛般涅槃已來並云萬歲謬也不然何者以此釋迦賢劫時望前三佛般涅槃時故云九十一劫及卅一劫雖拘樓孫佛四萬歲時出拘那佛三萬歲時出迦葉佛二萬歲時出即次後佛望即前佛故云萬歲而非釋迦時望前三佛皆萬歲也七佛姓字父母道樹弟一雙侍者弟子廣如彼亦復智至人民姓字者述云此後化衆也准無延經唯衛佛父字波潭剎利王母字波頭末所治國名波頭末式佛父字阿輪剎利王母字波羅越所治國名阿留那末隨葉佛父字著波羅提剎利王母字夜耶祇所治國名阿濡墨拘樓孫佛父字阿耆達波羅門種母字准耶阿耆達所治國辨城有三初名體次量後莊嚴此初也今時雖未有而未來當有故云當有居中王城周遍護城人民所居名廓成佛經云翻頭未昔云有幢今慧幢言雖不同其義無違何者長阿含經第五云爾時聖王建大寶幢圓十六尋上高千尋雜色嚴其幢有百孤孤有百枝寶縷織成衆寶間廁於是聖王懷此幢王以施沙門波羅門國中貧者准知城中有此幢故云有幢亦以此幢施沙門等故云慧幢雖有二義而城似雞頭故總名雞頭有說梵云翅頭未此反雞頭此解不然作佛經云有地城名雞頭末故東西十二至七由旬者述云此城量也太成佛云縱廣一千二百由旬高七由旬與此云十二由旬相違者興衰別故至下當解即表輪王教導令循十善自地兼行故十二由旬法王必成七寶故七由旬又雖受勝報而不出十二緣起故十二由旬不離七有七隨眠故七由旬土地豐熟至御巷成行者述云此後城莊嚴莊嚴雖多略表三種土地人民街巷廣如下解爾時城中至盡之請和者述云第二龍王加好成佛經云有大力龍王名曰多羅尸棄今云水光互舉華夷故不相違是時雞頭城中至極為香淨者述云第三鬼神除惡成佛經云有大夜叉神名跋陀婆羅賖塞伽秦云善好今云葉華即善好之類也梵云藥叉此云暴惡又名勇猛即是神名通天鬼傍生今云羅剎者即可畏也此即彼城藥叉羅剎皆有故隨談一種互不相違法即道理教即言教行順道理不越聖言故阿難當知至十萬由旬者述云第二土地廣美有二初地水增減後傍乘釋疑初又有三初地增次地水兼減辨水獨減此初也成佛經云是時閻浮提地長十千由旬廣八千由旬四大海水漸減少三千由旬長十千由旬金光明經第六云閻浮提地縱廣七千由旬水減三千由旬之地足本七千故十千由旬今此經云十萬由旬難可會釋有義遂機宜故有此異此解不然應無乖文而會釋故今作此解彌勒初出時四海水多減而地多增故十萬由旬漸久遠時海水還漸增地遂狹短故十千由旬但瑜伽論委悉說故六千五百由旬更有違文例之可會諸山河石至皆悉消滅者述云第至如鏡清明者述云第二傍乘釋疑疑即有六一廣未必平疑二平或無穀疑三穀無人民疑四人民乏珍疑五寶無聚落疑六村無樹果疑疑既有六故決亦有六一廣必平正決二平豐五穀決三穀食兼人決四人具珍寶決五寶興聚落決六村枹甘果決此初疑云地雖十萬由旬未必平正故云其地平正如鏡清明理實于時亦有諸山但對今時故云平正不爾便違下文大迦葉住此山故問壞劫未有彌勒已出由何因緣故無諸山答依般涅槃後諸比丘經我般泥洹後一百歲吾諸弟子沙門聽聰明智慧與我無異千歲之後三百歲之中大亂灾矣衆患萬變切身億灾人民欲盡時當有大水高二十里清諸名山滿十二年乃去了所在無復有山其地平政樂不可言月光童子乃出世了便以般若波羅蜜教諸人民得道者日有千百生天不可數其時人民身長八尺壽百八千歲有時人民多食自然人民但念道金寶不用衆聖側塞於世宮殿城廓皆用七寶法王治世五十二年便去自是之後法遂漸未羅云於諸塔寺取佛舍利聚著一處然後乃般泥洹龍王當取舍利去及佛十二部經於海中供養之是以後大法盡矣後人當壽四十五十乃沒時人當壽五歲時無有君王臣佐爾時五歲乃與今一歲等了人欲盡時大海通小皆大涌沸地剡浮提當大平正彌勒佛乃成之舉剡浮提至穀食豐賤者述云第二疑云地雖平正未必五穀成就故作此解人民熾盛者述云第三疑云穀食雖成未必有穀之人故作此言經多諸珍寶者述云第四疑云雖人民興穀食豐熟未必有諸珍寶故作此釋雞鳴相接者述云第五疑云雖多珍寶未必村落相近故作此解是時弊華至皆生其他者述云第六疑云雖村落接未必有樹果甘美故作此通
